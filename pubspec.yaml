name: plantcare_pro
description: গাছের যত্ন - Your ultimate plant care companion
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Navigation
  get: ^4.6.6

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # AI & APIs
  google_generative_ai: ^0.4.0
  http: ^1.2.1

  # Google Services
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  geolocator: ^11.0.0

  # Media
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_staggered_grid_view: ^0.7.0

  # Icons & Fonts
  iconsax_plus: ^1.0.0
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  fl_chart: ^0.69.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.5
  connectivity_plus: ^6.0.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/data/

  # Fonts section removed because I will use google_fonts package for simplicity unless user provides files
